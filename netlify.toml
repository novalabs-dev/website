[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Paused experiment redirects (Nova Labs op pauze 2026-04-26) — free tool pages removed
[[redirects]]
  from = "/contextkit"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/contextkit/*"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/cost-dashboard"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/cost-dashboard/*"
  to = "/blog"
  status = 301
  force = true

# Product download redirects -> Supabase Storage (public bucket)
[[redirects]]
  from = "/download/playbook"
  to = "https://lmgkaljzocppkiqmevis.supabase.co/storage/v1/object/public/products/playbook/AI-OS-Blueprint-Playbook.pdf"
  status = 302
  force = true

[[redirects]]
  from = "/download/bundle"
  to = "https://lmgkaljzocppkiqmevis.supabase.co/storage/v1/object/public/products/bundle/AI-OS-Blueprint-Bundle.pdf"
  status = 302
  force = true

[[redirects]]
  from = "/download/skill-pack"
  to = "https://lmgkaljzocppkiqmevis.supabase.co/storage/v1/object/public/products/skill-pack/business-skill-pack.zip"
  status = 302
  force = true

# Killed experiments — return 410 Gone (search engines deindex)
# Content Repurposing: killed 2026-04-25 per council verdict (Stout/markt-gap citations refuted)
[[redirects]]
  from = "/repurpose"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/repurpose/*"
  to = "/"
  status = 410
  force = true
